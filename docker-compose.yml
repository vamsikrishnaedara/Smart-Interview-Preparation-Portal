services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: smart_interview
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/smart_interview
      DB_USERNAME: admin
      DB_PASSWORD: password
      DB_DRIVER: org.postgresql.Driver
      DB_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JWT_SECRET: your_very_long_and_secure_jwt_secret_key_2026
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend
