spring.application.name=smart-interview-backend
server.port=${PORT:8080}

# Database Configuration (Default to H2 for local, override with ENV for Production)
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/smart_interview_portal;AUTO_SERVER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:smartInterviewPreparationPortalJwtSecretKeyMustBeLongEnough2026}
app.jwt.expiration-ms=86400000

# H2 Console (Disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Security
spring.jpa.open-in-view=false
