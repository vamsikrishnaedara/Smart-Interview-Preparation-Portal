spring.application.name=smart-interview-backend
server.port=8080

spring.datasource.url=jdbc:h2:file:./data/smart_interview_portal;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=smartInterviewPreparationPortalJwtSecretKeyMustBeLongEnough2026
app.jwt.expiration-ms=86400000
