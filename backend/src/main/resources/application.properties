spring.application.name=smart-interview-backend
server.port=${PORT:8080}

# Database Configuration (Auto-detects Postgres or H2 based on the URL)
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/smart_interview_portal;AUTO_SERVER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# Spring Boot will auto-detect the driver-class-name and dialect from the URL
# But we can provide a default for local H2:
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:smartInterviewPreparationPortalJwtSecretKeyMustBeLongEnough2026}
app.jwt.expiration-ms=86400000

# Security & Misc
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.open-in-view=false
